<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First GitHub Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding-top: 100px;
        }

        .card {
            background: white;
            width: 350px;
            margin: auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #0078ff;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #005fd1;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hello, GitHub! 👋</h1>
        <p>This is my first website uploaded to GitHub.</p>

        <button onclick="sayHello()">
            Click Me
        </button>
    </div>

    <script>
        function sayHello() {
            alert("Welcome to my first GitHub website! 🚀");
        }
    </script>

</body>
</html>
